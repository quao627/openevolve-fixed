max_iterations: 100
checkpoint_interval: 10
log_level: INFO
llm:
  primary_model: claude-opus-4-6
  primary_model_weight: 1.0
  api_base: https://api.anthropic.com/v1
  api_key: ${ANTHROPIC_API_KEY}
  temperature: 0.7
  max_tokens: 16384
  timeout: 600
prompt:
  system_message: |-
    You are an expert in computational geometry.
    Pack 11 unit hexagons inside a larger hexagon, minimizing the outer hexagon's side length.
    Benchmark side length is 3.930092.
    Consider optimization with scipy, rotation angles, and strategic placement.
    numpy and scipy are available.
  num_top_programs: 3
  use_template_stochasticity: true
database:
  population_size: 60
  archive_size: 25
  num_islands: 4
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7
evaluator:
  timeout: 600
  cascade_evaluation: false
  parallel_evaluations: 1
  use_llm_feedback: false
diff_based_evolution: false
allow_full_rewrites: true

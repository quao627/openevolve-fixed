max_iterations: 100
checkpoint_interval: 10
log_level: INFO
llm:
  primary_model: claude-opus-4-6
  primary_model_weight: 1.0
  api_base: https://api.anthropic.com/v1
  api_key: ${ANTHROPIC_API_KEY}
  temperature: 0.7
  max_tokens: 16384
  timeout: 600
prompt:
  system_message: |-
    You are an expert mathematician specializing in circle packing and computational geometry.
    Your task is to improve a function that packs 26 circles into a unit square to maximize the sum of radii.
    The AlphaEvolve benchmark is 2.635977.

    Key insights:
    - Circle packings often follow hexagonal patterns in dense regions
    - Variable-sized circles often pack better than uniform sizes
    - STRONGLY RECOMMENDED: Use scipy.optimize.minimize with SLSQP for constrained optimization
    - Define constraints for no overlap and boundary containment
    - Consider multi-start optimization with different initial layouts
    - numpy and scipy are available
  num_top_programs: 3
  use_template_stochasticity: true
database:
  population_size: 60
  archive_size: 25
  num_islands: 4
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7
evaluator:
  timeout: 600
  cascade_evaluation: false
  parallel_evaluations: 1
  use_llm_feedback: false
diff_based_evolution: false
allow_full_rewrites: true

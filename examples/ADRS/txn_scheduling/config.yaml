max_iterations: 100
checkpoint_interval: 10
log_level: INFO
llm:
  primary_model: claude-opus-4-6
  primary_model_weight: 1.0
  api_base: https://api.anthropic.com/v1
  api_key: ${ANTHROPIC_API_KEY}
  temperature: 0.7
  max_tokens: 16384
  timeout: 600
prompt:
  system_message: |-
    You are an expert in database transaction optimization.
    Improve get_best_schedule to find transaction orderings that minimize total makespan.
    Transactions have read/write operations on shared data items and conflicts create dependencies.
    Score = 1,000,000 / (1 + total_makespan).
    Focus on conflict-aware ordering, better search strategies, pruning.
    Only modify code within EVOLVE-BLOCK markers. Do NOT modify get_random_costs.
  num_top_programs: 3
  use_template_stochasticity: true
database:
  population_size: 50
  archive_size: 25
  num_islands: 3
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7
evaluator:
  timeout: 600
  cascade_evaluation: false
  parallel_evaluations: 1
  use_llm_feedback: false
diff_based_evolution: true
allow_full_rewrites: false

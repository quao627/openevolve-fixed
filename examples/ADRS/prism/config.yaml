max_iterations: 100
checkpoint_interval: 10
log_level: INFO
llm:
  primary_model: claude-opus-4-6
  primary_model_weight: 1.0
  api_base: https://api.anthropic.com/v1
  api_key: ${ANTHROPIC_API_KEY}
  temperature: 0.7
  max_tokens: 16384
  timeout: 600
prompt:
  system_message: |-
    You are an expert in GPU cluster resource management.
    Optimize compute_model_placement to minimize max KVPR across GPUs.
    KVPR = sum(req_rate/slo) / (80GB - total_model_size) per GPU.
    Score = 1/avg_max_kvpr + success_rate across 50 random test cases.
    Focus on better bin-packing, KVPR-aware assignment, constraint satisfaction.
    numpy is available.
  num_top_programs: 3
  use_template_stochasticity: true
database:
  population_size: 50
  archive_size: 25
  num_islands: 3
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7
evaluator:
  timeout: 360
  cascade_evaluation: false
  parallel_evaluations: 1
  use_llm_feedback: false
diff_based_evolution: true
allow_full_rewrites: false

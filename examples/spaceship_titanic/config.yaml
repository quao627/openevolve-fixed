# Spaceship Titanic Classification тАФ Claude Opus 4.6
max_iterations: 200
checkpoint_interval: 10
log_level: "INFO"

# LLM configuration
llm:
  primary_model: "claude-opus-4-6"
  primary_model_weight: 1.0
  api_base: "https://api.anthropic.com/v1"
  api_key: "${ANTHROPIC_API_KEY}"
  temperature: 0.7
  max_tokens: 16384
  timeout: 600

# Prompt configuration
prompt:
  system_message: |
    Welcome to the year 2912, where your data science skills are needed to solve a
    cosmic mystery. We've received a transmission from four lightyears away and things
    aren't looking good.

    The Spaceship Titanic was an interstellar passenger liner launched a month ago. With
    almost 13,000 passengers on board, the vessel set out on its maiden voyage transporting
    emigrants from our solar system to three newly habitable exoplanets orbiting nearby
    stars.

    While rounding Alpha Centauri en route to its first destination тАФ the torrid 55
    Cancri E тАФ the unwary Spaceship Titanic collided with a spacetime anomaly hidden
    within a dust cloud. Sadly, it met a similar fate as its namesake from 1000 years
    before. Though the ship stayed intact, almost half of the passengers were transported
    to an alternate dimension!

    To help rescue crews and retrieve the lost passengers, you are challenged to predict
    which passengers were transported by the anomaly using records recovered from the
    spaceship's damaged computer system.

    Your task is to predict whether a passenger was transported to an alternate dimension
    during the Spaceship Titanic's collision with the spacetime anomaly. To help you make
    these predictions, you're given a set of personal records recovered from the ship's
    damaged computer system.

    **File and Data Field Descriptions:**

    - `train.csv` тАФ Personal records for the passengers, to be used as training data.
      - `PassengerId` тАФ A unique Id for each passenger. Each Id takes the form `gggg_pp`
        where `gggg` indicates a group the passenger is travelling with and `pp` is their
        number within the group. People in a group are often family members, but not always.
      - `HomePlanet` тАФ The planet the passenger departed from, typically their planet of
        permanent residence.
      - `CryoSleep` тАФ Indicates whether the passenger elected to be put into suspended
        animation for the duration of the voyage. Passengers in cryosleep are confined to
        their cabins.
      - `Cabin` тАФ The cabin number where the passenger is staying. Takes the form
        `deck/num/side`, where `side` can be either `P` for Port or `S` for Starboard.
      - `Destination` тАФ The planet the passenger will be debarking to.
      - `Age` тАФ The age of the passenger.
      - `VIP` тАФ Whether the passenger has paid for special VIP service during the voyage.
      - `RoomService`, `FoodCourt`, `ShoppingMall`, `Spa`, `VRDeck` тАФ Amount the passenger
        has billed at each of the Spaceship Titanic's many luxury amenities.
      - `Name` тАФ The first and last names of the passenger.
      - `Transported` тАФ Whether the passenger was transported to another dimension. This is
        the target, the column you are trying to predict.
    - `test.csv` тАФ Personal records for the test passengers. Your task is to predict the
      value of `Transported` for the passengers in this set.
    - `sample_submission.csv` тАФ A submission file in the correct format.
      - `PassengerId` - Id for each passenger in the test set.
      - `Transported` - The target. For each passenger, predict either `True` or `False`.

    **Evaluation:**

    Submissions are evaluated based on classification accuracy, the percentage of predicted
    labels that are correct.

    **Your program** (`solution.py`) must define a `run(train_path, test_path)` function
    that returns a pandas DataFrame with columns `PassengerId` and `Transported` (boolean).

    - Metric is classification accuracy (higher is better, 0тАУ1 scale)
    - Kaggle leaderboard (2288 teams): top score 0.82815, gold тЙе 0.821, silver тЙе 0.814, bronze тЙе 0.810. You are aiming to beat the top score.
    - A naive baseline (predict all False) scores ~0.50
    - Good models score 0.78тАУ0.80+. Top Kaggle scores exceed 0.82
    - The eval timeout is 120s тАФ keep training time reasonable

  num_top_programs: 3
  num_diverse_programs: 2
  use_template_stochasticity: true

# Database configuration
database:
  population_size: 40
  archive_size: 20
  num_islands: 4
  migration_interval: 30
  elite_selection_ratio: 0.3
  exploitation_ratio: 0.7

# Evaluator configuration
evaluator:
  timeout: 120
  max_retries: 2
  cascade_evaluation: false
  parallel_evaluations: 1
  use_llm_feedback: false

# Evolution settings
diff_based_evolution: false
allow_full_rewrites: true
